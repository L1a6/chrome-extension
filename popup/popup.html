<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Mono:ital,wght@0,400;0,500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <header class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 6h16M4 10h16M4 14h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="18" cy="18" r="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M21 21l-1.5-1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="brand-name">PageLens</span>
    </div>
    <div class="header-controls">
      <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle dark/light mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:none">
          <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="page-info" id="pageInfo">
    <div class="favicon-wrap" id="faviconWrap"></div>
    <span class="page-title" id="pageTitle">Loading…</span>
  </div>

  <main class="main" id="mainArea">

    <div class="state" id="stateIdle">
      <div class="idle-graphic">
        <div class="pulse-ring"></div>
        <div class="pulse-ring ring-2"></div>
        <div class="idle-core">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6h16M4 10h16M4 14h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="18" cy="18" r="4" stroke="currentColor" stroke-width="1.5"/>
            <path d="M21 21l-1.5-1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <p class="state-hint">Ready to analyze this page</p>
    </div>

    <div class="state hidden" id="stateLoading">
      <div class="spinner-wrap">
        <svg class="spinner-ring" viewBox="0 0 52 52" aria-hidden="true">
          <circle class="track" cx="26" cy="26" r="22" fill="none" stroke-width="3"/>
          <circle class="arc" cx="26" cy="26" r="22" fill="none" stroke-width="3" stroke-dasharray="90 48"/>
        </svg>
        <div class="spinner-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
      <p class="state-hint" id="loadingMsg">Extracting content…</p>
    </div>

    <div class="state hidden" id="stateError">
      <div class="error-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="16" x2="12.01" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="error-msg" id="errorMsg">Something went wrong</p>
      <button class="btn-link" id="errorSettingsBtn" style="display:none">Configure API Key →</button>
    </div>

    <div class="state hidden" id="stateResult">
      <div class="meta-strip">
        <div class="meta-chip">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span id="readingTime">–</span>
        </div>
        <span class="meta-divider" aria-hidden="true"></span>
        <div class="meta-chip">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6h16M4 10h16M4 14h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span id="wordCount">–</span>
        </div>
        <span class="meta-divider" aria-hidden="true"></span>
        <div class="meta-chip cached-chip hidden" id="cachedChip">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Cached</span>
        </div>
      </div>

      <section class="result-block" id="summaryBlock">
        <h2 class="block-label">Summary</h2>
        <ul class="summary-list" id="summaryList" aria-label="Page summary"></ul>
      </section>

      <section class="result-block" id="insightsBlock">
        <h2 class="block-label">Key Insights</h2>
        <div class="insights-grid" id="insightsList" aria-label="Key insights"></div>
      </section>

      <div class="highlight-bar">
        <span class="highlight-label">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Highlight on page
        </span>
        <button
          class="toggle"
          id="highlightToggle"
          role="switch"
          aria-checked="false"
          aria-label="Toggle in-page highlights"
        ></button>
      </div>
    </div>

  </main>

  <footer class="footer">
    <button class="btn-primary" id="summarizeBtn">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Summarize Page
    </button>

    <div class="secondary-actions hidden" id="secondaryActions">
      <button class="icon-btn copy-btn" id="copyBtn" title="Copy summary" aria-label="Copy summary to clipboard">
        <svg class="copy-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <svg class="check-icon hidden" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="btn-ghost" id="clearBtn">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Clear
      </button>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
